server:
  port: 8081

spring:
  application:
    name: lib-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=1

        - id: books-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/books/**
          filters:
            - StripPrefix=1
            - name: JwtAuthenticationFilter

        - id: users-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=1
            - name: JwtAuthenticationFilter

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.elib.gateway: DEBUG
    org.springframework.cloud.gateway: INFO