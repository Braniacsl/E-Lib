server:
  port: 8081

spring:
  application:
    name: lib-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      routes:
        - id: identity-auth
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**

        - id: identity-users
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: JwtAuthenticationFilter

        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/books/**
          filters:
            - name: JwtAuthenticationFilter

        - id: borrowing-service
          uri: lb://borrowing-service
          predicates:
            - Path=/api/v1/loans/**
          filters:
            - name: JwtAuthenticationFilter

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8081"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.elib.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
